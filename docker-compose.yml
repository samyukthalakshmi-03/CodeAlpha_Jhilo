version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: social-media-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: social-media
    volumes:
      - mongo-data:/data/db
    networks:
      - social-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: social-media-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/social-media
      JWT_SECRET: your_super_secret_jwt_key_please_change_in_production
      NODE_ENV: development
    depends_on:
      - mongo
    networks:
      - social-network
    command: npm start

  frontend:
    image: nginx:alpine
    container_name: social-media-frontend
    ports:
      - "80:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - social-network

volumes:
  mongo-data:

networks:
  social-network:
    driver: bridge
